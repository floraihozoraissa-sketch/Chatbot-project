<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
       body{
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0;
        margin-bottom: 0;
       }

      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
       }
      .chat-input {
       padding: 12px 15px;
       border-radius: 10px;
       border-width: 1px;
       font-size: 15px; 
       
       flex-grow: 1;
       }
      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
       }
      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
       }
      .chat-message-user {
        display: flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-robot{
        display: flex;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;  
        margin-left: 10px;     
        margin-bottom: 20px; 
        max-width: 300px;
      }
      .chat-message-profile{
        width: 45px;
      }
      .userspecs{
        border-radius: 30px;
      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
      .welcome-screen{
        flex-grow: 1;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        text-align: center;
        color: #555;
      }
      .welcome-screen h1{
        margin-bottom: 10px;

      }
      .welcome-screen p{
        margin: 5px;
      }
      .spinner-container {
  display: flex;
  align-items: center;
  margin-left: 10px;
  margin-bottom: 20px;
}
.gif-spinner {
  width: 50px;
  height: 50px;
  margin-left: 10px;
}

    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

  function ChatInput({ 
    chatMessages, 
    setChatMessages, 
    setshowWelcome,
    isLoading,
    setIsLoading  }){

    const[inputText, setInputText] = React.useState('');
         
    function saveInputText(event){
     setInputText(event.target.value);
    }
    async function sendMessage(){

      if(inputText.trim() === ''){
        return;
      }else{
        setshowWelcome(false);
      }

      const newChatMessages = [
      ...chatMessages, 
      {
       message: inputText,
       sender: 'user',
       id: crypto.randomUUID()
      }
    ];
      setChatMessages(newChatMessages);
      setInputText('');

      setIsLoading(true);

      try{
         const response = await Chatbot.getResponseAsync(inputText);
         setChatMessages([
      ...newChatMessages, 
      {
       message: response,
       sender: 'robot',
       id: crypto.randomUUID()
      }
    ]);
      } catch(error){
        console.error("Error getting chatbot response:", error);
      } finally {
        setIsLoading(false);
      }

    }
    function keyPressed(event){
     if(event.key === 'Enter'){
      sendMessage();
     }
      if(event.key === 'Escape'){
      setInputText('');
    }
    }
  

    return(
      <div className = 'chat-input-container'>
        <input
          placeholder={isLoading ? "Bot is typing...": "Send a message to Chatbot"}
          disabled = {isLoading} 
          size="30"
          onChange = {saveInputText}
          onKeyDown = {keyPressed}
          value = {inputText}
          className = 'chat-input'
         />  
        <button 
        disabled = {isLoading || inputText.trim() === ''}
        onClick = {sendMessage}
        className = 'send-button'
        >Send</button>
      </div>
    )
  }

  function ChatMessage({ message, sender }){
    // const message = props.message;
    // const sender = props.sender;
    // const{message, sender} = props;

    // if(sender === "robot"){
    //     return(
    //       <div>
            
    //   <img src='robot.png' alt="user profile missing" width ='100px' height='50px' />
    //    {message}
    //         </div>
    //     )
    // }
    return (
    <div className = {sender === 'user' ? 'chat-message-user' : 'chat-message-robot'}>
      {sender === 'robot' && 
      (<img src='robot.png' alt="user profile missing" className =  'chat-message-profile'/>)}

        <div className = 'chat-message-text'>{message}</div>
       
       {sender === 'user' &&  
       (<img src='user.jpeg' alt="user profile missing"  className =  'chat-message-profile userspecs' />)}
    
      </div>
      
    );
  }

  
  function ChatMessages({ chatMessages, isLoading }){

   const chatMessagesRef = React.useRef(null);

    React.useEffect(() => {
      const containerElem = chatMessagesRef.current;
      if(containerElem){
        containerElem.scrollTop = containerElem.scrollHeight;
      }
    }, [chatMessages, isLoading]);
   return(
    <div className = 'chat-messages-container' ref = {chatMessagesRef}>
      {chatMessages.length === 0 ? (
        <div className="welcome-screen">
          <h1>👋 Welcome</h1>
          <p>I'm your Chatbot.</p>
          <p>Ask me anything to get started.</p>
        </div>
      ) : (
        chatMessages.map((chatMessage) => {
          return(
            <ChatMessage
              message = {chatMessage.message}
              sender = {chatMessage.sender}
              key = {chatMessage.id}
            />
          )
        })
      )}
   {isLoading && (
    <div className = 'chat-message-robot spinner-container'>
      <img src="robot.png" alt="robot profile" className="chat-message-profile" />
      <img src="https://supersimple.dev/images/loading-spinner.gif" alt="Loading..." className = 'gif-spinner'/>
      </div>
   )}
    </div>
   )
   
  }

  function App() {
    const [isLoading, setIsLoading] = React.useState(false);
    const [chatMessages, setChatMessages] = React.useState([]);
    // const chatMessages = array;
    // const setChatMessages = array;
    return(
        <div className = 'app-container'>
          <ChatMessages
            chatMessages = {chatMessages}
            isLoading = {isLoading}
          />   
          
          <ChatInput
            chatMessages = {chatMessages}
            setChatMessages = {setChatMessages}
            setshowWelcome = {() => {}}
            isLoading = {isLoading}
            setIsLoading = {setIsLoading}
          />       
        </div>
    )
  }
   

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
      
    </script>
  </body>
</html>
